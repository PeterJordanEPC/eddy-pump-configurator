/* ---------- Dynamic track (head question only for 50–200 GPM) ---------- */
function buildTrack(a) {
  if (a.application === "dredging") return ["application", "material", "production_dredge", "power", "deployment_dredge"];
  if (a.application === "process") {
    const t = ["application", "material", "flow_pump"];
    if (a.production === "f_50_200") t.push("head");
    t.push("power", "deployment_pump");
    return t;
  }
  return ["application"];
}

/* ---------- Recommendation engine ---------- */
/* GPM -> pump size class. NOTE: 5-in pump intentionally never recommended. */
const PUMP_SIZE = {
  f_5_50: "1-in", f_50_200: "2-in", f_200_400: "3-in", f_400_900: "4-in",
  f_900_1600: "6-in", f_1600_2500: "8-in", f_2500_3500: "10-in",
  f_3500_6000: "12-in", f_6000_12000: "16-in",
};

function recommend(a) {
  const { application, production, power, deployment, head } = a;
  const drive = power === "diesel" ? "Diesel drive package" : power === "hydraulic" ? "Hydraulic drive package" : "Electric motor drive";

  if (application === "dredging") {
    /* Production (cu yd/hr) -> pump size class, per EDDY Pump platform specs */
    const ds = {
      p_150: { size: "4-in", exf: "EXF-4000", gpm: "250–1,200 GPM", prod: "75–150 cu yd/hr" },
      p_200: { size: "6-in", exf: "EXF-6000", gpm: "450–2,500 GPM", prod: "150–200 cu yd/hr" },
      p_300: { size: "8-in", exf: "EXF-8000", gpm: "1,400–3,600 GPM", prod: "250–300 cu yd/hr" },
      p_350: { size: "10-in", exf: "EXF-10000", gpm: "1,600–5,000 GPM", prod: "300–350 cu yd/hr" },
      p_600: { size: "12-in", exf: "EXF-12000", gpm: "2,600–7,300 GPM", prod: "500–600 cu yd/hr" },
    }[production] || { size: "8-in", exf: "EXF-8000", gpm: "1,400–3,600 GPM", prod: "250–300 cu yd/hr" };
    const sizeSpecs = [ds.size + " discharge class", ds.gpm + " flow range"];
    const fam = {
      excavator: { family: ds.exf + " Excavator Dredge Pump Attachment (" + ds.size + ")", art: "excavator", blurb: "Mounts to the stick of your excavator and turns it into a production dredge. Hydraulic drive runs straight off the machine's auxiliary circuit.", specs: [...sizeSpecs, "Runs off excavator hydraulics", "Cutterhead options for hard-packed material"] },
      cable: { family: "Cable-Deployed Dredge Pump — " + ds.size + " Class", art: "cable", blurb: "Lowered by crane or cable from shore, barge, or gantry. Available in electric or hydraulic drive with water-jetting rings for fast-settling material.", specs: [...sizeSpecs, drive, "Optional water jetting ring"] },
      remote: { family: "Subdredge™ Remote-Operated Dredge — " + ds.size + " Class", art: "remote", blurb: "A crewless, self-propelled dredge driven from shore — built around the EDDY Pump non-clog design for high-solids production without divers or support boats.", specs: [...sizeSpecs, "Remote operation from shore", "EDDY Pump non-clog rotor"] },
      sled: { family: "Dredge Sled — " + ds.size + " Class", art: "sled", blurb: "The EDDY Pump mounted on a skid frame, winched across the bottom from shore — steady production with a minimal equipment footprint.", specs: [...sizeSpecs, "Winch-guided from shore", "Low equipment footprint"] },
      diver: { family: "Diver-Operated Dredge — " + ds.size + " Class", art: "diver", blurb: "A diver-guided EDDY Pump for precise removal in confined or sensitive areas where larger equipment can't work.", specs: [...sizeSpecs, "Precise, diver-directed dredging", "Confined and sensitive areas"] },
      auger: { family: "Mini Auger ModDredge — " + ds.size + " Class", art: "auger", blurb: "A compact auger dredge for lagoons, small ponds, and tight footprints — the auger feeds settled material straight into the EDDY Pump.", specs: [...sizeSpecs, "Compact footprint", "Auger-fed for settled solids"] },
    }[deployment];
    return fam || { family: "EDDY Dredge System", art: "dredging", blurb: "Our engineering team will match the right dredge configuration to your project.", specs: sizeSpecs };
  }

  // Process pump path
  if (production === "f_50_200" && head === "h_over") {
    return {
      family: "EDDY HH2000 High-Head Pump",
      art: "slurry",
      blurb: "Purpose-built for high-head duty — 50–200 GPM with discharge head over 120 ft is exactly what the HH2000 was designed to do, with the same non-clog EDDY rotor.",
      specs: ["High-head design (120+ ft)", "50–200 GPM duty range", drive, "Non-clog high-solids design"],
    };
  }
  const size = PUMP_SIZE[production] || "4-in";
  const config = { flooded: { label: "Flooded Suction Pump", art: "flooded" }, submersible: { label: "Submersible Pump", art: "submersible" }, selfpriming: { label: "Self-Priming Pump", art: "selfpriming" } }[deployment] || { label: "Process Pump", art: "slurry" };
  return {
    family: `EDDY Pump ${size} ${config.label}`,
    art: config.art,
    blurb: "The core EDDY Pump design: a geometrically induced eddy current instead of a close-tolerance impeller — high solids tolerance, low wear, no clogging on the material you described.",
    specs: [`${size} discharge class`, config.label + " configuration", drive, "Passes large solids without clogging"],
  };
}

function labelFor(qid, optId) {
  const q = QUESTIONS[qid];
  const o = q?.options.find((x) => x.id === optId);
  return o ? o.label : optId;
}

const SHEET_ROWS = [
  { key: "application", label: "APPLICATION" },
  { key: "material", label: "MATERIAL" },
  { key: "production", label: "PRODUCTION" },
  { key: "head", label: "HEAD" },
  { key: "power", label: "POWER" },
  { key: "deployment", label: "DEPLOYMENT" },
];

function EddyConfigurator() {
  const [answers, setAnswers] = useState({});
  const [stepIdx, setStepIdx] = useState(0);
  const [done, setDone] = useState(false);
  const [showOther, setShowOther] = useState(false);
  const [otherText, setOtherText] = useState("");
  const [lead, setLead] = useState({ name: "", email: "", company: "", phone: "" });
  const [submitted, setSubmitted] = useState(false);

  const track = buildTrack(answers);
  const currentQid = track[stepIdx];
  const question = QUESTIONS[currentQid];
  const totalSteps = answers.application ? track.length : 5;

  const rec = useMemo(() => (done ? recommend(answers) : null), [done, answers]);

  const advance = (next) => {
    setAnswers(next);
    setShowOther(false);
    setOtherText("");
    const newTrack = buildTrack(next);
    if (stepIdx + 1 >= newTrack.length) setDone(true);
    else setStepIdx(stepIdx + 1);
  };

  const pick = (opt) => {
    const q = QUESTIONS[currentQid];
    if (q.key === "material" && opt.id === "other") { setShowOther(true); return; }
    let next = { ...answers, [q.key]: opt.id };
    if (q.key === "application" && answers.application && answers.application !== opt.id) next = { application: opt.id };
    if (q.key === "production" && opt.id !== "f_50_200") delete next.head;
    advance(next);
  };

  const continueOther = () => {
    if (!otherText.trim()) return;
    advance({ ...answers, material: "other", materialOther: otherText.trim() });
  };

  const back = () => {
    if (done) { setDone(false); setSubmitted(false); return; }
    setShowOther(false);
    if (stepIdx > 0) setStepIdx(stepIdx - 1);
  };

  const restart = () => { setAnswers({}); setStepIdx(0); setDone(false); setSubmitted(false); setShowOther(false); setOtherText(""); setLead({ name: "", email: "", company: "", phone: "" }); };

  const handleSubmit = () => {
    if (!lead.name || !lead.email) return;
    /* PRODUCTION: replace with HubSpot Forms API —
       POST https://api.hsforms.com/submissions/v3/integration/submit/{portalId}/{formGuid}
       Include configurator answers as contact properties. */
    setSubmitted(true);
  };

  const sheetValue = (key) => {
    if (key === "material" && answers.material === "other" && answers.materialOther) return answers.materialOther;
    const qid = { application: "application", material: "material", production: answers.application === "process" ? "flow_pump" : "production_dredge", head: "head", power: "power", deployment: answers.application === "process" ? "deployment_pump" : "deployment_dredge" }[key];
    return labelFor(qid, answers[key]);
  };
  const answeredRows = SHEET_ROWS.filter((r) => answers[r.key]);

  return (
    <div className="cfg">
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

        .cfg { min-height: 100vh; background: #141B23; color: #E8EBEE; font-family: 'Barlow', sans-serif;
               --orange: #F26A21; --steel: #5B6B7C; --panel: #1C2530; --line: #2A3644; --paper: #E8EBEE; }
        .cfg * { box-sizing: border-box; }

        .topbar { display:flex; align-items:center; justify-content:space-between; padding: 18px 28px; border-bottom: 1px solid var(--line); }
        .logo { font-family:'Barlow Condensed'; font-weight:700; font-size:26px; letter-spacing:0.06em; }
        .logo span { color: var(--orange); }
        .logo small { display:block; font-family:'IBM Plex Mono'; font-size:10px; letter-spacing:0.28em; color: var(--steel); font-weight:400; margin-top:2px; }
        .restart { background:none; border:1px solid var(--line); color:var(--steel); font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:0.12em; padding:8px 14px; cursor:pointer; transition: border-color .2s, color .2s; }
        .restart:hover, .restart:focus-visible { border-color: var(--orange); color: var(--paper); outline:none; }

        .progress { display:flex; gap:6px; padding: 0 28px; margin-top:18px; }
        .tick { height:3px; flex:1; background: var(--line); }
        .tick.on { background: var(--orange); }

        .main { display:flex; gap:0; align-items:flex-start; max-width: 1180px; margin: 0 auto; padding: 34px 28px 80px; }
        .stage { flex: 1 1 auto; min-width: 0; }

        .eyebrow { font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:0.3em; color: var(--orange); margin-bottom: 10px; }
        h1.q { font-family:'Barlow Condensed'; font-weight:600; font-size: clamp(30px, 4.5vw, 46px); line-height:1.05; margin: 0 0 8px; text-transform: uppercase; letter-spacing: 0.015em; }
        .sub { color: #9AA7B4; font-size: 15px; margin: 0 0 30px; max-width: 52ch; }

        .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 16px; }
        .card { text-align:left; background: var(--panel); border: 1px solid var(--line); padding: 0 0 18px; cursor:pointer; color: inherit; font-family:inherit;
                transition: transform .15s ease, border-color .15s ease; display:flex; flex-direction:column; }
        .card:hover, .card:focus-visible { border-color: var(--orange); transform: translateY(-3px); outline: none; }
        .cardArt { width:100%; height:auto; display:block; background: #16202B; border-bottom:1px solid var(--line); }
        .cardPhoto { aspect-ratio: 160/115; object-fit: cover; }
        .card h3 { font-family:'Barlow Condensed'; font-size: 21px; font-weight:600; letter-spacing:0.02em; margin: 14px 16px 4px; text-transform: uppercase; }
        .card p { margin: 0 16px; font-size: 13.5px; color:#9AA7B4; line-height:1.45; }
        .photoNote { margin-top:auto; padding: 12px 16px 0; font-family:'IBM Plex Mono'; font-size: 9.5px; letter-spacing:0.14em; color:#44525F; }

        .otherBox { margin-top: 20px; background: var(--panel); border: 1px solid var(--orange); padding: 18px 20px; max-width: 520px; }
        .otherBox label { display:block; font-family:'IBM Plex Mono'; font-size: 11px; letter-spacing:0.2em; color: var(--orange); margin-bottom: 10px; }
        .otherRow { display:flex; gap: 10px; }
        .otherRow input { flex:1; background:#141B23; border:1px solid var(--line); color: var(--paper); padding: 11px 12px; font-family:'Barlow'; font-size: 14px; }
        .otherRow input:focus-visible { outline:none; border-color: var(--orange); }

        .backbtn { margin-top: 26px; background:none; border:none; color: var(--steel); font-family:'IBM Plex Mono'; font-size:12px; letter-spacing:0.12em; cursor:pointer; padding:6px 2px; }
        .backbtn:hover, .backbtn:focus-visible { color: var(--paper); outline:none; }

        .sheet { width: 270px; flex: 0 0 270px; margin-left: 36px; background: var(--panel); border:1px solid var(--line); position: sticky; top: 24px; }
        .sheet .head { padding: 14px 18px; border-bottom: 1px dashed var(--line); font-family:'IBM Plex Mono'; font-size: 11px; letter-spacing: 0.26em; color: var(--orange); }
        .sheet .row { display:flex; justify-content:space-between; gap:10px; padding: 11px 18px; border-bottom: 1px solid var(--line); font-family:'IBM Plex Mono'; font-size: 11.5px; }
        .sheet .row .k { color: var(--steel); letter-spacing:0.08em; }
        .sheet .row .v { color: var(--paper); text-align:right; }
        .sheet .empty { padding: 16px 18px; color: #44525F; font-family:'IBM Plex Mono'; font-size: 11px; line-height: 1.7; }

        .result { max-width: 760px; }
        .resultCard { background: var(--panel); border: 1px solid var(--line); border-top: 3px solid var(--orange); padding: 0; }
        .resultCard .cardArt { border-bottom: 1px solid var(--line); }
        .resultBody { padding: 22px 26px 26px; }
        h2.fam { font-family:'Barlow Condensed'; font-weight:700; font-size: 32px; margin: 0 0 4px; text-transform:uppercase; letter-spacing:0.02em; }
        .blurb { color:#B6C0CA; line-height: 1.55; margin: 0 0 16px; font-size: 15px; }
        .speclist { display:flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
        .chip { font-family:'IBM Plex Mono'; font-size: 11px; letter-spacing:0.06em; border: 1px solid var(--line); color:#9AA7B4; padding: 6px 10px; }
        .disclaimer { font-size: 12.5px; color: #6B7A88; line-height:1.6; margin-top: 18px; border-left: 2px solid var(--line); padding-left: 12px; }

        .leadbox { margin-top: 26px; background: var(--panel); border: 1px solid var(--line); padding: 22px 26px; }
        .leadbox h3 { font-family:'Barlow Condensed'; text-transform:uppercase; font-size: 20px; margin: 0 0 6px; letter-spacing:0.03em; }
        .leadbox p { color:#9AA7B4; font-size: 13.5px; margin: 0 0 16px; }
        .fields { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .fields input { background:#141B23; border:1px solid var(--line); color: var(--paper); padding: 11px 12px; font-family:'Barlow'; font-size: 14px; width:100%; }
        .fields input:focus-visible { outline:none; border-color: var(--orange); }
        .cta { margin-top: 14px; background: var(--orange); border:none; color:#141B23; font-family:'Barlow Condensed'; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; font-size: 16px; padding: 13px 26px; cursor:pointer; }
        .cta:disabled { opacity: 0.4; cursor: default; }
        .cta:not(:disabled):hover { filter: brightness(1.08); }
        .thanks { font-family:'IBM Plex Mono'; color: var(--orange); font-size: 13px; letter-spacing:0.06em; line-height:1.7; }

        @media (max-width: 860px) {
          .main { flex-direction: column; }
          .sheet { width: 100%; flex: none; margin: 28px 0 0; position: static; }
          .fields { grid-template-columns: 1fr; }
        }
        @media (prefers-reduced-motion: reduce) { .card, .card:hover { transition:none; transform:none; } }
      `}</style>

      <div className="topbar">
        <div className="logo">
          EDDY<span> PUMP</span>
          <small>PUMP &amp; DREDGE CONFIGURATOR</small>
        </div>
        <button className="restart" onClick={restart}>START OVER</button>
      </div>

      <div className="progress" role="progressbar" aria-valuenow={done ? totalSteps : stepIdx} aria-valuemax={totalSteps}>
        {Array.from({ length: totalSteps }).map((_, i) => (
          <div key={i} className={`tick ${done || i <= stepIdx ? "on" : ""}`} />
        ))}
      </div>

      <div className="main">
        <div className="stage">
          {!done && question && (
            <>
              <div className="eyebrow">{question.eyebrow} · {stepIdx + 1} / {totalSteps}</div>
              <h1 className="q">{question.title}</h1>
              {question.sub && <p className="sub">{question.sub}</p>}
              <div className="grid">
                {question.options.map((opt) => (
                  <button key={opt.id} className="card" onClick={() => pick(opt)}>
                    <CardImage kind={opt.art} />
                    <h3>{opt.label}</h3>
                    <p>{opt.desc}</p>
                    <div className="photoNote">PHOTO PLACEHOLDER — SWAP FOR PRODUCT SHOT</div>
                  </button>
                ))}
              </div>
              {showOther && (
                <div className="otherBox">
                  <label>WHAT ARE YOU MOVING?</label>
                  <div className="otherRow">
                    <input autoFocus placeholder="e.g. drilling mud, fly ash, fish waste…" value={otherText}
                      onChange={(e) => setOtherText(e.target.value)}
                      onKeyDown={(e) => { if (e.key === "Enter") continueOther(); }} />
                    <button className="cta" style={{marginTop: 0}} disabled={!otherText.trim()} onClick={continueOther}>Continue</button>
                  </div>
                </div>
              )}
              {stepIdx > 0 && <button className="backbtn" onClick={back}>← BACK</button>}
            </>
          )}

          {done && rec && (
            <div className="result">
              <div className="eyebrow">RECOMMENDED CONFIGURATION</div>
              <div className="resultCard">
                <CardImage kind={rec.art} />
                <div className="resultBody">
                  <h2 className="fam">{rec.family}</h2>
                  <p className="blurb">{rec.blurb}</p>
                  <div className="speclist">
                    {rec.specs.map((s) => <span key={s} className="chip">{s}</span>)}
                  </div>
                  <p className="disclaimer">
                    This recommendation identifies the right product family for your application.
                    Final pump sizing, drive selection, and pricing are confirmed by an EDDY Pump
                    sales engineer based on your site conditions, pumping distance, and material analysis.
                  </p>
                </div>
              </div>

              <div className="leadbox">
                {!submitted ? (
                  <>
                    <h3>Get detailed pricing &amp; a spec sheet</h3>
                    <p>An EDDY Pump sales engineer will review your configuration and follow up with firm numbers.</p>
                    <div className="fields">
                      <input placeholder="Name *" value={lead.name} onChange={(e) => setLead({ ...lead, name: e.target.value })} />
                      <input placeholder="Work email *" type="email" value={lead.email} onChange={(e) => setLead({ ...lead, email: e.target.value })} />
                      <input placeholder="Company" value={lead.company} onChange={(e) => setLead({ ...lead, company: e.target.value })} />
                      <input placeholder="Phone" value={lead.phone} onChange={(e) => setLead({ ...lead, phone: e.target.value })} />
                    </div>
                    <button className="cta" disabled={!lead.name || !lead.email} onClick={handleSubmit}>
                      Send my configuration
                    </button>
                  </>
                ) : (
                  <div className="thanks">
                    CONFIGURATION SENT ✓<br />
                    Your configuration is on its way to our engineering team.
                  </div>
                )}
              </div>

              <button className="backbtn" onClick={back}>← CHANGE MY ANSWERS</button>
            </div>
          )}
        </div>

        <aside className="sheet">
          <div className="head">BUILD SHEET</div>
          {answeredRows.length === 0 && (
            <div className="empty">SPEC LINES POPULATE AS YOU ANSWER —<br />LIKE A TRAVELER CARD ON THE SHOP FLOOR.</div>
          )}
          {answeredRows.map((r) => (
            <div className="row" key={r.key}>
              <span className="k">{r.label}</span>
              <span className="v">{sheetValue(r.key)}</span>
            </div>
          ))}
          {done && rec && (
            <div className="row"><span className="k">FAMILY</span><span className="v">{rec.family}</span></div>
          )}
        </aside>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<EddyConfigurator />);

</script>
</body>
</html>
